<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Path · Eliz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B2240;--ink-soft:#5A618A;--paper:#FFFBF6;--card:#FFFFFF;
  --coral:#FF6B5B;--coral-dk:#E8503F;--teal:#10B5A4;--teal-dk:#0C9183;
  --sun:#FFC24B;--grape:#7C5CFC;--green:#2FB873;--red:#F4604C;--line:#ECE6DC;
  --shadow:0 14px 34px -16px rgba(27,34,64,.30);--shadow-sm:0 6px 16px -10px rgba(27,34,64,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;
  background:radial-gradient(1200px 600px at 85% -8%,#FFE9D6 0%,transparent 55%),
             radial-gradient(900px 500px at -5% 8%,#DCF6F1 0%,transparent 50%),var(--paper);}
.wrap{max-width:540px;margin:0 auto;min-height:100vh;padding:0 18px 120px;position:relative}
h1,h2,h3,.fred{font-family:'Fredoka',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}
.ph{font-family:'Nunito';font-style:italic;color:var(--grape);font-weight:700;font-size:13.5px;margin-top:3px;letter-spacing:.2px}
.ph::before{content:"🗣 ";font-style:normal;opacity:.7}

/* topbar */
.topbar{display:flex;align-items:center;gap:12px;padding:20px 4px 14px;position:sticky;top:0;z-index:20;
  background:linear-gradient(var(--paper) 72%,transparent)}
.brand{display:flex;align-items:center;gap:9px;font-family:'Fredoka';font-weight:700;font-size:20px;letter-spacing:-.2px}
.logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(140deg,var(--coral),var(--grape));
  display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:var(--shadow-sm);transform:rotate(-6deg)}
.stats{margin-left:auto;display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:5px;background:var(--card);border:1.5px solid var(--line);
  border-radius:999px;padding:6px 11px;font-weight:800;font-size:14px;box-shadow:var(--shadow-sm)}
.pill.xp .ic{color:var(--sun)}.pill.streak .ic{color:var(--coral)}

/* hero */
.hi{font-family:'Fredoka';font-weight:600;font-size:29px;line-height:1.13;letter-spacing:-.6px;padding:4px 4px 0}
.hi b{color:var(--coral)}
.sub{color:var(--ink-soft);font-weight:700;margin:6px 4px 0;font-size:15px}

/* word of day */
.wod{margin:18px 0 4px;background:linear-gradient(135deg,#fff,#FFF8EF);border:1.5px solid var(--line);
  border-radius:20px;padding:16px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.wod .tag{font-family:'Fredoka';font-weight:600;font-size:11.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--sun)}
.wod .w{font-family:'Fredoka';font-weight:600;font-size:27px;letter-spacing:-.4px;margin-top:2px}
.wod .t{color:var(--ink-soft);font-weight:800;font-size:15px}
.wod .spk{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:14px;
  background:var(--teal);color:#fff;display:grid;place-items:center;font-size:20px;box-shadow:var(--shadow-sm)}
.wod .spk:active{transform:translateY(-50%) scale(.92)}

/* review button */
.review{display:flex;align-items:center;gap:12px;margin-top:12px;background:var(--grape);color:#fff;
  border-radius:18px;padding:15px 18px;box-shadow:0 8px 0 -2px #5b3fd6;font-family:'Fredoka';font-weight:600;font-size:17px}
.review:active{transform:translateY(3px);box-shadow:0 5px 0 -2px #5b3fd6}
.review .big{font-size:22px}
.review small{display:block;font-family:'Nunito';font-weight:700;font-size:12.5px;opacity:.9;margin-top:1px}

.section-h{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--ink-soft);
  text-transform:uppercase;letter-spacing:1.4px;margin:28px 4px 12px}

/* department grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.dept{background:var(--card);border:1.5px solid var(--line);border-radius:22px;padding:16px 15px;
  box-shadow:var(--shadow-sm);text-align:left;position:relative;transition:transform .12s;animation:rise .45s both}
.dept:active{transform:scale(.97)}
.dept .ic{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;font-size:25px;color:#fff}
.dept .t{font-family:'Fredoka';font-weight:600;font-size:16.5px;margin-top:11px;letter-spacing:-.2px;line-height:1.1}
.dept .d{color:var(--ink-soft);font-weight:700;font-size:12px;margin-top:3px;line-height:1.25}
.dept .bar{height:6px;background:#F0EBE2;border-radius:99px;margin-top:11px;overflow:hidden}
.dept .bar>i{display:block;height:100%;border-radius:99px;transition:width .5s}
.dept .lv{font-family:'Fredoka';font-weight:600;font-size:11px;color:var(--ink-soft);margin-top:6px}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* dept screen (level list) */
.screen{position:fixed;inset:0;z-index:30;background:var(--paper);display:flex;flex-direction:column;animation:slideIn .28s}
@keyframes slideIn{from{transform:translateX(34px);opacity:0}to{transform:none;opacity:1}}
.shead{display:flex;align-items:center;gap:12px;padding:18px 18px 6px;max-width:540px;margin:0 auto;width:100%}
.back{width:40px;height:40px;border-radius:13px;background:#fff;border:1.5px solid var(--line);
  display:grid;place-items:center;font-size:21px;color:var(--ink-soft);flex:0 0 auto}
.shead .ti{font-family:'Fredoka';font-weight:600;font-size:21px;letter-spacing:-.3px}
.sbody{flex:1;overflow-y:auto;padding:8px 18px 30px;max-width:540px;margin:0 auto;width:100%}
.deptintro{font-weight:700;color:var(--ink-soft);font-size:14.5px;margin:4px 2px 18px;line-height:1.4}

.path{position:relative;padding-top:4px}
.node{position:relative;display:flex;align-items:center;gap:15px;padding:9px 0;animation:rise .45s both}
.disc{flex:0 0 auto;width:62px;height:62px;border-radius:20px;display:grid;place-items:center;font-size:26px;
  position:relative;box-shadow:var(--shadow);transition:transform .15s}
.disc.done{color:#fff}.disc.open{background:#fff;border:2.5px solid var(--coral)}
.disc.lock{background:#F2ECE2;color:#C9BFAE;box-shadow:none}
.node.tap:active .disc{transform:scale(.93)}
.disc .ck{position:absolute;right:-5px;bottom:-5px;width:23px;height:23px;border-radius:50%;background:var(--sun);
  color:#7a4d00;display:grid;place-items:center;font-size:12px;border:3px solid var(--paper)}
.nbody{flex:1;min-width:0}
.nbody .t{font-family:'Fredoka';font-weight:600;font-size:17.5px;letter-spacing:-.2px}
.nbody .d{color:var(--ink-soft);font-weight:700;font-size:13px;margin-top:1px;line-height:1.25}
.go{flex:0 0 auto;width:36px;height:36px;border-radius:12px;background:var(--coral);color:#fff;
  display:grid;place-items:center;font-size:18px;font-weight:900;box-shadow:var(--shadow-sm)}
.node.lockrow{opacity:.6}.node.lockrow .go{display:none}
.connector{position:absolute;left:30px;top:62px;width:2px;height:36px;
  background:repeating-linear-gradient(var(--line) 0 6px,transparent 6px 11px)}

/* name gate */
.gate{position:fixed;inset:0;z-index:60;background:linear-gradient(160deg,#FFF3E8,#E7F7F3);
  display:grid;place-items:center;padding:26px;text-align:center}
.gate .box{max-width:380px;animation:rise .5s both}
.gate .emoji{font-size:60px;margin-bottom:10px}
.gate h2{font-size:27px;font-family:'Fredoka';font-weight:600;letter-spacing:-.4px;line-height:1.15}
.gate p{color:var(--ink-soft);font-weight:700;margin:10px 0 22px;font-size:15px}
.gate input{width:100%;text-align:center;font-family:'Fredoka';font-size:22px;font-weight:500;padding:16px;
  border:2.5px solid var(--line);border-radius:18px;background:#fff;color:var(--ink);outline:none}
.gate input:focus{border-color:var(--coral)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  font-family:'Fredoka';font-weight:600;font-size:18px;color:#fff;background:var(--coral);
  padding:15px;border-radius:17px;box-shadow:0 7px 0 -2px var(--coral-dk);transition:transform .1s,box-shadow .1s}
.btn:active{transform:translateY(3px);box-shadow:0 4px 0 -2px var(--coral-dk)}
.btn.teal{background:var(--teal);box-shadow:0 7px 0 -2px var(--teal-dk)}
.btn.ghost{background:#fff;color:var(--ink-soft);box-shadow:0 0 0 2px var(--line) inset;font-size:16px}
.btn:disabled{opacity:.4;box-shadow:none}

/* lesson */
.lesson{position:fixed;inset:0;z-index:40;background:var(--paper);display:flex;flex-direction:column;animation:slideIn .28s}
.lhead{display:flex;align-items:center;gap:13px;padding:18px 18px 8px;max-width:540px;margin:0 auto;width:100%}
.xbtn{width:38px;height:38px;border-radius:12px;background:#fff;border:1.5px solid var(--line);
  display:grid;place-items:center;font-size:19px;color:var(--ink-soft);flex:0 0 auto}
.steps{flex:1;height:12px;background:#F0EBE2;border-radius:99px;overflow:hidden}
.steps>i{display:block;height:100%;background:linear-gradient(90deg,var(--coral),var(--sun));border-radius:99px;transition:width .4s}
.lbody{flex:1;overflow-y:auto;padding:10px 18px 18px;max-width:540px;margin:0 auto;width:100%}
.lfoot{padding:12px 18px calc(16px + env(safe-area-inset-bottom));max-width:540px;margin:0 auto;width:100%;
  background:linear-gradient(transparent,var(--paper) 30%)}
.foot-row{display:flex;gap:10px}
.foot-row .btn{flex:1}
.foot-row .btn.ghost{flex:0 0 38%}
.feedback{font-family:'Fredoka';font-weight:600;font-size:15.5px;text-align:center;margin-bottom:9px;min-height:20px}
.feedback.ok{color:var(--green)}.feedback.no{color:var(--coral-dk)}

.kicker{font-family:'Fredoka';font-weight:600;color:var(--coral);text-transform:uppercase;letter-spacing:1.5px;
  font-size:12px;text-align:center;margin-top:6px}
.qhead{font-family:'Fredoka';font-weight:600;font-size:22px;text-align:center;letter-spacing:-.3px;margin:5px 0 16px;line-height:1.2}

/* flashcard */
.flash{background:var(--card);border:1.5px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
  padding:26px 22px;text-align:center;margin-top:6px}
.flash .emoji{font-size:54px;line-height:1;margin-bottom:6px}
.flash .big{font-family:'Fredoka';font-weight:600;font-size:34px;letter-spacing:-.5px;line-height:1.1}
.flash .pt{color:var(--ink-soft);font-weight:800;font-size:17px;margin-top:6px}
.flash .ph{justify-self:center;display:inline-block;margin-top:6px;font-size:14px}
.spkrow{display:flex;gap:9px;justify-content:center;margin-top:16px}
.speak{display:inline-flex;align-items:center;gap:7px;background:var(--teal);color:#fff;
  font-family:'Fredoka';font-weight:600;font-size:15px;padding:10px 16px;border-radius:99px;box-shadow:var(--shadow-sm)}
.speak.slow{background:#fff;color:var(--teal-dk);box-shadow:0 0 0 2px var(--teal) inset}
.speak:active{transform:scale(.94)}
.exbox{margin-top:18px;background:#FBF6EE;border-radius:15px;padding:13px 15px;text-align:left}
.exbox .en{font-weight:800;font-size:15.5px}
.exbox .ptx{color:var(--ink-soft);font-weight:700;font-size:13.5px;margin-top:2px}
.exbox .speak{margin-top:9px}
.dots{display:flex;gap:6px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.dots i{width:8px;height:8px;border-radius:50%;background:var(--line)}
.dots i.on{background:var(--coral);width:20px;border-radius:99px}

/* quiz */
.opts{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.opt{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--line);border-radius:16px;
  padding:15px;font-weight:800;font-size:16.5px;text-align:left;box-shadow:var(--shadow-sm);transition:transform .08s}
.opt:active{transform:scale(.985)}
.opt .key{width:25px;height:25px;border-radius:8px;background:#F4EFE6;display:grid;place-items:center;
  font-family:'Fredoka';font-size:13px;color:var(--ink-soft);flex:0 0 auto}
.opt.right{border-color:var(--green);background:#EEFBF3}.opt.right .key{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:#FDEEEC}.opt.wrong .key{background:var(--red);color:#fff}
.opt.dim{opacity:.5}

/* match / image-match */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.chip{background:#fff;border:2px solid var(--line);border-radius:15px;padding:14px 10px;font-weight:800;
  font-size:15.5px;text-align:center;min-height:56px;display:grid;place-items:center;box-shadow:var(--shadow-sm);transition:.12s}
.chip.en{font-family:'Fredoka';font-weight:600}
.chip.big{font-size:34px}
.chip.sel{border-color:var(--grape);background:#F2EEFF;transform:translateY(-2px)}
.chip.matched{border-color:var(--teal);background:#E6F8F5;color:var(--teal-dk);opacity:.6;pointer-events:none}
.chip.miss{border-color:var(--red);animation:shake .35s}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* sentence build */
.answer{min-height:58px;background:#fff;border:2px dashed var(--line);border-radius:15px;padding:11px;
  display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;margin-top:6px}
.bank{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;justify-content:center}
.word{background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 14px;font-family:'Fredoka';
  font-weight:600;font-size:16px;box-shadow:var(--shadow-sm)}
.word.used{opacity:.3;pointer-events:none}
.word.placed{background:#F2EEFF;border-color:var(--grape)}
.answer.right{border-color:var(--green);border-style:solid;background:#EEFBF3}

/* phrase / listen&repeat */
.phrase{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-top:10px;box-shadow:var(--shadow-sm)}
.phrase .top{display:flex;align-items:flex-start;gap:11px}
.phrase .txt{flex:1;min-width:0}
.phrase .en{font-weight:800;font-size:16px}
.phrase .ptx{color:var(--ink-soft);font-weight:700;font-size:13.5px;margin-top:2px}
.phrase .bs{display:flex;flex-direction:column;gap:6px;flex:0 0 auto}
.mini{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:17px;flex:0 0 auto}
.mini.t{background:#E6F8F5;color:var(--teal-dk)}.mini.s{background:#FFF3E0;color:#C98A12}
.rep{margin-top:11px;display:flex;align-items:center;gap:9px;border-top:1px dashed var(--line);padding-top:11px}
.rep .lbl{font-weight:800;font-size:13px;color:var(--ink-soft);flex:1}
.rep .rate{display:flex;gap:7px}
.rate button{width:42px;height:38px;border-radius:11px;font-size:18px;background:#F6F1E8;border:1.5px solid var(--line)}
.rate button.good.on{background:var(--green);border-color:var(--green)}
.rate button.bad.on{background:#FDEEEC;border-color:var(--red)}

/* song card */
.song{background:var(--card);border:1.5px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
  padding:20px;margin-top:6px;text-align:center}
.song .name{font-family:'Fredoka';font-weight:600;font-size:24px;letter-spacing:-.4px}
.song .art{color:var(--ink-soft);font-weight:800;font-size:14px;margin-top:1px}
.song .theme{background:#FBF6EE;border-radius:14px;padding:12px 14px;margin-top:14px;font-weight:700;font-size:14px;text-align:left;color:#6a5a3e}
.spfy{display:inline-flex;align-items:center;gap:8px;background:#1DB954;color:#fff;font-family:'Fredoka';
  font-weight:600;font-size:15px;padding:11px 20px;border-radius:99px;margin-top:14px;text-decoration:none;box-shadow:var(--shadow-sm)}
.spfy:active{transform:scale(.95)}
.songline{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:11px;
  display:flex;align-items:center;gap:11px;box-shadow:var(--shadow-sm)}
.songline .txt{flex:1}.songline .en{font-weight:800;font-size:15.5px}.songline .ptx{color:var(--ink-soft);font-weight:700;font-size:13px;margin-top:1px}

/* quote card */
.quote{background:var(--card);border:1.5px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
  padding:26px 22px;margin-top:6px;text-align:center;position:relative}
.quote .mk{font-family:'Fredoka';font-size:48px;color:var(--line);line-height:.6}
.quote .q{font-family:'Fredoka';font-weight:500;font-size:23px;line-height:1.25;letter-spacing:-.3px;margin-top:6px}
.quote .au{font-weight:900;color:var(--coral);font-size:14px;margin-top:12px;text-transform:uppercase;letter-spacing:1px}
.quote .tr{color:var(--ink-soft);font-weight:700;font-style:italic;font-size:14.5px;margin-top:8px}

/* complete + cando */
.done{position:fixed;inset:0;z-index:50;display:grid;place-items:center;text-align:center;padding:28px;
  background:linear-gradient(160deg,#FFF1E2,#E6F7F2)}
.done .card{max-width:380px;animation:pop .5s both}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}
.done .medal{font-size:70px;animation:spin 1.1s ease}
@keyframes spin{from{transform:rotate(-25deg) scale(.5)}to{transform:none}}
.done h2{font-family:'Fredoka';font-weight:600;font-size:28px;margin-top:4px;letter-spacing:-.4px}
.cando{background:#fff;border-radius:18px;padding:16px 18px;margin-top:16px;box-shadow:var(--shadow-sm);text-align:left}
.cando .h{font-family:'Fredoka';font-weight:600;font-size:14px;color:var(--teal-dk);display:flex;align-items:center;gap:7px}
.cando .b{font-weight:800;font-size:15.5px;margin-top:6px;line-height:1.35}
.reward{display:inline-flex;align-items:center;gap:8px;background:#fff;border-radius:99px;padding:9px 18px;
  font-family:'Fredoka';font-weight:600;font-size:19px;color:var(--sun);margin-top:16px;box-shadow:var(--shadow-sm)}
.reward .x{color:var(--ink)}
.confetti{position:fixed;top:-12px;width:11px;height:16px;border-radius:2px;z-index:55;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.85}}

.note{font-size:12.5px;color:var(--ink-soft);font-weight:700;text-align:center;margin-top:26px;line-height:1.5;opacity:.85}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- NAME GATE -->
<div class="gate" id="gate">
  <div class="box">
    <div class="emoji">👋</div>
    <h2>Welcome!<br>Como podemos te chamar?</h2>
    <p>Digite seu primeiro nome para começar a jornada.</p>
    <input id="nameInput" type="text" placeholder="Seu nome" autocomplete="off" maxlength="18" value="Eliz">
    <button class="btn" id="startBtn" style="margin-top:16px">Começar &nbsp;→</button>
  </div>
</div>

<!-- HOME -->
<div class="wrap" id="home" style="display:none">
  <div class="topbar">
    <div class="brand"><span class="logo">✦</span> English Path</div>
    <div class="stats">
      <div class="pill xp"><span class="ic">★</span><span id="xpVal">0</span></div>
      <div class="pill streak"><span class="ic">🔥</span><span id="streakVal">1</span></div>
    </div>
  </div>
  <div class="hi">Hi, <b id="greetName">Eliz</b> 👋<br>o que vamos treinar?</div>
  <div class="sub" id="motiv">Escolha um departamento. Eles são independentes!</div>

  <div class="wod" id="wod"></div>
  <button class="review" id="reviewBtn">
    <span class="big">🎯</span>
    <span>Revisão do dia<small>Mistura palavras que você já viu</small></span>
  </button>

  <div class="section-h">Departamentos</div>
  <div class="grid" id="grid"></div>

  <div class="note">🔊 Toque para ouvir · 🐢 ouvir devagar · seu progresso fica salvo neste aparelho.</div>
</div>

<!-- DEPT SCREEN -->
<div class="screen hidden" id="dept">
  <div class="shead">
    <button class="back" id="deptBack">‹</button>
    <div class="ti" id="deptTitle"></div>
  </div>
  <div class="sbody">
    <div class="deptintro" id="deptIntro"></div>
    <div class="path" id="deptPath"></div>
  </div>
</div>

<!-- LESSON -->
<div class="lesson hidden" id="lesson">
  <div class="lhead">
    <button class="xbtn" id="quitLesson">✕</button>
    <div class="steps"><i id="stepFill" style="width:0%"></i></div>

/* =====================================================================
   STATE + STORAGE (graceful fallback; persists when opened locally)
   ===================================================================== */
const mem={};
const store={get(k){try{return localStorage.getItem(k)}catch(e){return k in mem?mem[k]:null}},
             set(k,v){try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}};
let S=load();
function load(){try{const r=store.get("eng2");if(r)return JSON.parse(r);}catch(e){}return {name:"",xp:0,streak:1,done:{},seen:[]};}
function save(){store.set("eng2",JSON.stringify(S));}
function key(d,i){return d+":"+i;}

let enVoice=null;
function pickVoice(){if(!('speechSynthesis'in window))return;const v=speechSynthesis.getVoices();
  enVoice=v.find(x=>x.lang==='en-US'&&/female|samantha|zira|google|jenny|aria/i.test(x.name))
        ||v.find(x=>x.lang==='en-US')||v.find(x=>x.lang&&x.lang.startsWith('en'))||null;}
if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=pickVoice;pickVoice();}
function speak(t,slow){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t.replace(/…/g,''));u.lang='en-US';u.rate=slow?0.55:0.9;u.pitch=1.02;
  if(enVoice)u.voice=enVoice;speechSynthesis.speak(u);}

const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const speakBtns=(t,label)=>`<button class="speak" onclick="speak('${t.replace(/'/g,"\\'")}')"><span>🔊</span>${label?' '+label:''}</button>

let CUR=null,CURI=0,FLOW=[],step=0,earned=0,REVIEW=false;

function startLevel(d,i){
  CUR=d.levels[i];CURDEPT=d;CURI=i;earned=0;step=0;REVIEW=false;
  FLOW=buildFlow(CUR);
  enterLesson();
}
function startReview(){
  // gather vocab from completed levels (or all if none done)
  let pool=[];DEPTS.forEach(d=>d.levels.forEach((l,i)=>{if(S.done[key(d.id,i)])pool=pool.concat(l.vocab||[]);}));
  if(pool.length<4){pool=[];DEPTS.forEach(d=>d.levels.forEach(l=>pool=pool.concat(l.vocab||[])));}
  pool=shuffle(pool).slice(0,6);
  CUR={title:"Revisão do dia",cando:"Manter na memória as palavras que você já aprendeu. A repetição é o segredo!"};
  CURDEPT={id:"__review",color:"#7C5CFC"};CURI=-1;earned=0;step=0;REVIEW=true;
  FLOW=pool.map(v=>quizStep(v,pool)).concat([{type:'cando'}]);
  enterLesson();
}
function enterLesson(){
  $("#home").style.display='none';$("#dept").classList.add('hidden');
  $("#lesson").classList.remove('hidden');
  $("#quitLesson").onclick=()=>{if(confirm('Sair? O progresso desta atividade não será salvo.'))REVIEW?openHome():openDept(CURDEPT);};
  renderStep();
}

function buildFlow(L){
  const f=[];
  if(L.kind==='songs'){
    L.songs.forEach(s=>f.push({type:'song',s}));
    const vlines=[];L.songs.forEach(s=>s.lines.forEach(x=>vlines.push({en:x.en,pt:x.pt,ph:x.ph})));
    shuffle(vlines).slice(0,4).forEach(v=>f.push(quizStep(v,vlines)));
    f.push({type:'cando'});return f;
  }
  if(L.kind==='quotes'){
    L.quotes.forEach(q=>f.push({type:'quote',q}));
    f.push({type:'qauthor',quotes:L.quotes});
    f.push({type:'cando'});return f;
  }
  // lesson / words
  L.vocab.forEach((v,idx)=>f.push({type:'flash',v,idx,total:L.vocab.length}));
  const hasImg=L.vocab.every(v=>v.img);
  f.push(hasImg?{type:'imgmatch',pairs:L.vocab.slice(0,4)}:{type:'match',pairs:L.vocab.slice(0,4)});
  shuffle(L.vocab).slice(0,4).forEach(v=>f.push(quizStep(v,L.vocab)));
  if(L.phrases&&L.phrases.length)f.push({type:'build',p:L.phrases[0]});
  if(L.phrases&&L.phrases.length)f.push({type:'phrases',list:L.phrases});
  f.push({type:'cando'});
  return f;
}
function quizStep(v,pool){
  const opts=shuffle([v.pt,...shuffle(pool.map(p=>p.pt).filter(p=>p!==v.pt)).slice(0,3)]);
  return {type:'quiz',v,options:opts,answer:v.pt};
}

function renderStep(){
  const f=FLOW[step];
  $("#stepFill").style.width=Math.round(step/FLOW.length*100)+"%";
  const b=$("#lbody"),ft=$("#lfoot");b.scrollTop=0;
  ({flash:rFlash,quiz:rQuiz,match:rMatch,imgmatch:rImg,build:rBuild,phrases:rPhrases,
    song:rSong,quote:rQuote,qauthor:rQAuthor,cando:rCando})[f.type](f,b,ft);
}
function foot(primaryLabel,primaryEnabled,onPrimary,primaryClass){
  const ft=$("#lfoot");
  ft.innerHTML=`<div class="feedback" id="fb"></div><div class="foot-row">
    <button class="btn ghost" id="bk">‹ Voltar</button>
    <button class="btn ${primaryClass||''}" id="nx" ${primaryEnabled?'':'disabled'}>${primaryLabel}</button></div>`;
  $("#bk").onclick=back;$("#nx").onclick=onPrimary||next;
}
function back(){if(step===0){REVIEW?openHome():openDept(CURDEPT);return;}step--;renderStep();}
function next(){step++;if(step>=FLOW.length){finish();return;}renderStep();}

/* ---- quiz ---- */
function rQuiz(f,b){
  b.innerHTML=`<div class="kicker">Quiz</div><div class="qhead">O que significa?</div>
   <div class="flash" style="padding:20px"><div class="big">${esc(f.v.en)}</div>
     <div class="ph">${esc(f.v.ph)}</div><div class="spkrow">${speakBtns(f.v.en,'Ouvir')}</div></div>
   <div class="opts" id="opts">${f.options.map((o,i)=>`<button class="opt" data-v="${esc(o)}">
     <span class="key">${'ABCD'[i]}</span><span>${esc(o)}</span></button>`).join('')}</div>`;
  foot('Continuar',false,next);
  setTimeout(()=>speak(f.v.en),250);
  let done=false;
  [...document.querySelectorAll('.opt')].forEach(o=>o.onclick=()=>{
    if(done)return;done=true;const ok=o.dataset.v===f.answer;
    document.querySelectorAll('.opt').forEach(x=>{
      if(x.dataset.v===f.answer)x.classList.add('right');
      else if(x===o)x.classList.add('wrong');else x.classList.add('dim');});
    const fb=$("#fb");
    if(ok){earned+=10;fb.textContent="✓ Isso! +10";fb.className="feedback ok";}
    else{fb.textContent="Resposta: "+f.answer;fb.className="feedback no";speak(f.v.en);}

  });

/* ---- word↔translation match ---- */
function rMatch(f,b){matchEngine(f,b,'pt');}
function rImg(f,b){matchEngine(f,b,'img');}
function matchEngine(f,b,rightField){
  b.innerHTML=`<div class="kicker">Jogo · combine os pares</div>
   <div class="qhead">${rightField==='img'?'Ligue a palavra à imagem':'Toque no inglês e na tradução'}</div>
   <div class="mgrid" id="grid"></div>`;
  foot('Continuar',false,next);
  const items=[];
  f.pairs.forEach((p,i)=>{items.push({k:i,side:'en',t:p.en});
    items.push({k:i,side:'r',t:rightField==='img'?p.img:p.pt,big:rightField==='img'});});
  const grid=$("#grid");
  shuffle(items).forEach(it=>{const c=document.createElement('button');
    c.className='chip '+(it.side==='en'?'en':'')+(it.big?' big':'');c.textContent=it.t;
    c.dataset.k=it.k;c.dataset.side=it.side;grid.appendChild(c);});
  let sel=null,matched=0;
  grid.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    if(c.classList.contains('matched'))return;
    if(c.dataset.side==='en')speak(c.textContent);
    if(!sel){sel=c;c.classList.add('sel');return;}
    if(sel===c){c.classList.remove('sel');sel=null;return;}
    if(sel.dataset.k===c.dataset.k&&sel.dataset.side!==c.dataset.side){
      [sel,c].forEach(x=>{x.classList.remove('sel');x.classList.add('matched');});
      sel=null;matched++;earned+=5;
      if(matched===f.pairs.length){$("#fb").textContent="Perfeito! 🎉";$("#fb").className="feedback ok";$("#nx").disabled=false;}
    }else{const a=sel,d=c;a.classList.add('miss');d.classList.add('miss');
      setTimeout(()=>{a.classList.remove('miss','sel');d.classList.remove('miss');},380);sel=null;}
  });
}

/* ---- sentence build ---- */
function rBuild(f,b){
  const words=f.p.en.replace(/[?.!,]/g,'').split(' ');
  b.innerHTML=`<div class="kicker">Monte a frase</div>
   <div class="qhead">${esc(f.p.pt)}</div>
   <div class="answer" id="ans"></div>
   <div class="bank" id="bank">${shuffle(words.map((w,i)=>({w,i}))).map(o=>
     `<button class="word" data-i="${o.i}">${esc(o.w)}</button>`).join('')}</div>
   <div class="ph" style="text-align:center;margin-top:14px">${esc(f.p.ph)}</div>`;
  foot('Continuar',false,next);
  const ans=$("#ans"),bank=$("#bank"),placed=[];
  function refresh(){
    ans.innerHTML=placed.map((p,idx)=>`<button class="word placed" data-p="${idx}">${esc(p.w)}</button>`).join('');
    ans.querySelectorAll('[data-p]').forEach(el=>el.onclick=()=>{
      const idx=+el.dataset.p;const it=placed.splice(idx,1)[0];
      bank.querySelector(`[data-i="${it.i}"]`).classList.remove('used');refresh();check();});
  }
  function check(){
    if(placed.length!==words.length)return;
    const ok=placed.map(p=>p.w).join(' ')===words.join(' ');
    if(ok){ans.classList.add('right');$("#fb").textContent="✓ Frase correta! +10";$("#fb").className="feedback ok";
      earned+=10;$("#nx").disabled=false;speak(f.p.en);}
    else{$("#fb").textContent="Quase! Toque numa palavra para tirar e tente de novo.";$("#fb").className="feedback no";}
  }
  bank.querySelectorAll('.word').forEach(el=>el.onclick=()=>{
    if(el.classList.contains('used'))return;el.classList.add('used');
    placed.push({w:el.textContent,i:+el.dataset.i});refresh();check();});
}

function finish(){
  $("#stepFill").style.width="100%";
  let fresh=false;
  if(!REVIEW){fresh=!S.done[key(CURDEPT.id,CURI)];if(fresh)S.done[key(CURDEPT.id,CURI)]=true;}
  S.xp+=earned;save();
  const ds=$("#doneScreen");
  ds.innerHTML=`<div class="card">
     <div class="medal">${REVIEW?'🎯':fresh?'🏅':'🔁'}</div>
     <h2>${REVIEW?'Revisão feita!':fresh?'Nível concluído!':'Boa revisão!'}</h2>

       <div class="b">${esc(CUR.cando)}</div></div>
     <div class="reward"><span>★</span> +${earned} <span class="x">XP</span></div>
     <button class="btn" id="bk" style="margin-top:22px">${REVIEW?'Voltar ao início':'Voltar aos níveis'}</button>
   </div>`;
  ds.classList.remove('hidden');$("#lesson").classList.add('hidden');
  if(fresh||REVIEW)confetti();
  $("#bk").onclick=()=>{ds.classList.add('hidden');REVIEW?openHome():openDept(CURDEPT);};
}
function confetti(){const c=['#FF6B5B','#FFC24B','#10B5A4','#7C5CFC','#2FB873'];
  for(let i=0;i<70;i++){const e=document.createElement('div');e.className='confetti';
    e.style.left=Math.random()*100+'vw';e.style.background=c[i%c.length];
    e.style.animationDuration=(1.6+Math.random()*1.4)+'s';e.style.animationDelay=(Math.random()*.4)+'s';
    e.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(e);
    setTimeout(()=>e.remove(),3200);}}
</script>
</body>
</html>
